name: Build Android APK with Buildozer

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # This line forces apt to resolve the LLVM hold and replaces it with the correct library
          sudo apt-get install -y --allow-downgrades libunwind-dev
          # Seamlessly install the rest of your build requirements
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev git ccache interactivesystem libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install Buildozer and Dependencies
        run: |
          pip install --upgrade pip
          pip install cython==0.29.33
          pip install buildozer
          pip install kines

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-apk
          path: bin/*.apk
      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-apk
          path: bin/*.apk
        run: |
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-apk
          path: bin/*.apk
            libssl-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            zlib1g-dev \
            liblzma-dev \
            libreadline-dev \
            libncurses5-dev \
            libgdbm-dev \
            libgdbm-compat-dev \
            libffi-dev \
            uuid-dev \
            libunwind-dev \
            openjdk-17-jdk-headless

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.33 virtualenv buildozer

      - name: Build APK with Buildozer
        env:
          BUILDOZER_WARN_ON_ROOT: 1
        run: |
          yes | buildozer android debug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: bin/*.apk          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          libsqlite3-dev \
          sqlite3 \
          bzip2 \
          libbz2-dev \
          libssl-dev \
          openssl \
          libgdbm-dev \
          libgdbm-compat-dev \
          liblzma-dev \
          libreadline-dev \
          libncursesw5-dev \
          libffi-dev \
          uuid-dev
        sudo apt-get install -y openjdk-17-jdk-headless autoconf automake libtool pkg-config cmake

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer virtualenv

    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 1

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aviatorpredictor-debug-apk
        path: bin/*.apk
