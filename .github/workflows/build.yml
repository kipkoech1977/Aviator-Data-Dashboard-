name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git python3 autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libreoffice-dev libjpeg-dev libpng-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install --upgrade buildozer cython==0.29.33 virtualenv

    - name: Build APK with Buildozer
      run: buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-Debug-APK
        path: bin/*.apk

# (int) Minimum API your APK will support.
android.minapi = 21

# (string) Android NDK version to use
# Commented out to let Buildozer auto-download the correct matching version
# android.ndk = 25b

# CRITICAL: This allows GitHub Actions workflows to accept the licenses automatically
android.accept_sdk_license = True


[buildozer]

# (int) Log level (0 = error only, 1 = info, 2 = debug)
log_level = 2

# (int) Display warning if buildozer is run as root
warn_root = 1
