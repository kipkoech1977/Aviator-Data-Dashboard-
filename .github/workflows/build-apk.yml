name: Buildozer Python APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Buildozer works best on Ubuntu 22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Buildozer requires specific Linux tools to compile Python into Android
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
        sudo apt-get install -y libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstreamer-plugins-base1.0-dev
        sudo apt-get install -y p7zip-full ccache libffi-dev libssl-dev autoconf automake libtool pkg-config
        pip3 install --user --upgrade buildozer Cython virtualenv

    # This steps tells Buildozer to compile your main.py into a debug APK
    - name: Build APK with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    # Uploads the finished .apk file so you can download it
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-built-apk
        path: .buildozer/android/app/build/outputs/apk/debug/*.apk
