name: Build Android APK

on:
  push:
    branches: [ "main" ] # Change to "master" if your branch is named master
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # This adds a manual "Run workflow" button in GitHub Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies and AIDL
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev aidl libstdc++6

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-android-apk
        path: .bin/*.apk
