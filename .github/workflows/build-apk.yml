name: Build Kivy APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            zlib1g-dev \
            openssl \
            libgdbm-dev \
            libncursesw5-dev \
            libncurses5-dev \
            xz-utils \
            tk-dev \
            libxml2-dev \
            libxmlsec1-dev \
            uuid-dev \
            libreadline-dev \
            openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer wheel

      - name: Automate Build and Accept Android Licenses
        run: |
          # Automatically answer 'y' to any terminal prompt (including Android SDK licenses)
          yes | buildozer -v android debug
        timeout-minutes: 40

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
            git \
            libffi-dev \
            libssl-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            zlib1g-dev \
            openssl \
            libgdbm-dev \
            libncursesw5-dev \
            libncurses5-dev \
            xz-utils \
            tk-dev \
            libxml2-dev \
            libxmlsec1-dev \
            uuid-dev \
            libreadline-dev \
            openjdk-17-jdk

      - name: Build Android APK with Buildozer
        uses: ArtemSaves/buildozer-action@v1
        timeout-minutes: 30  # Gives Numpy enough time to safely compile
        with:
          buildozer_version: master
          command: android debug
